name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python 백엔드 테스트 ──────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 핵심 의존성 설치 (GPU 제외)
        run: |
          pip install --upgrade pip
          # GPU 전용 패키지(torch/diffusers) 제외하고 설치
          pip install \
            google-generativeai \
            google-auth google-auth-oauthlib google-api-python-client \
            python-dotenv requests tenacity pydantic filelock \
            loguru sentry-sdk diskcache \
            praw pytrends feedparser beautifulsoup4 httpx \
            Pillow \
            faster-whisper \
            pytest pytest-mock \
            supabase

      - name: pytest 실행
        env:
          # mock 경로로 fallback 유도 (실제 API 키 불필요)
          KAS_ROOT: ${{ github.workspace }}
          GEMINI_API_KEY: ""
          YOUTUBE_API_KEY: ""
          SUPABASE_URL: "https://xxxxxxxxxxxx.supabase.co"
          SUPABASE_KEY: ""
        run: pytest tests/ -q --tb=short

  # ── Next.js 프론트엔드 빌드 + 타입 체크 ───────────────────────
  build-web:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 빌드 (TypeScript 타입 체크 포함)
        env:
          # mock URL로 Supabase fallback 유도
          NEXT_PUBLIC_SUPABASE_URL: "https://xxxxxxxxxxxx.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock-anon-key"
        run: npm run build
