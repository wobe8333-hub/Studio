# 채널별 캐릭터 Voice ID 매핑 (pipeline_v2 Track B — 최적화 ④)
# ElevenLabs voice_id는 .env에서 로드 → 여기는 설정값(stability, similarity_boost 등)

meta:
  version: "2.1"
  updated: "2026-04-22"
  maintainer: "devops-engineer"
  total_voices: 14

# 공통 ElevenLabs 설정 기본값
defaults:
  model_id: "eleven_multilingual_v2"
  output_format: "mp3_44100_128"
  optimize_streaming_latency: 2
  narrator:
    stability: 0.75
    similarity_boost: 0.80
    style: 0.20
    use_speaker_boost: true
  guest:
    stability: 0.65
    similarity_boost: 0.75
    style: 0.35
    use_speaker_boost: true

# 대화 자연스러움 설정
dialogue:
  pause_between_speakers_ms: 120  # 화자 교체 시 무음 삽입
  pause_end_of_sentence_ms: 80    # 문장 끝 숨

channels:
  CH1:
    name: "경제"
    narrator:
      role: "narrator"
      character: "신뢰감 있는 경제 전문가"
      voice_persona: "30대 남성, 차분하고 신뢰감 있는 목소리"
      voice_id_env: "CH1_NARRATOR_VOICE_ID"
      stability: 0.80
      similarity_boost: 0.85
    guest:
      role: "guest"
      character: "호기심 많은 직장인"
      voice_persona: "20대 여성, 밝고 호기심 넘치는 목소리"
      voice_id_env: "CH1_GUEST_VOICE_ID"
      stability: 0.60
      similarity_boost: 0.75
      style: 0.45

